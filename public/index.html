<!DOCTYPE html>
<html lang="es-CL">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Sami · Yeppo</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: #0d0d0d; color: #fff;
    height: 100dvh; width: 100vw; overflow: hidden;
    display: flex; flex-direction: column;
    user-select: none; -webkit-user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  .header { padding: 24px 20px 8px; text-align: center; flex-shrink: 0; }
  .header .logo { font-size: 14px; letter-spacing: 3px; color: #666; text-transform: uppercase; }
  .header h1 { font-size: 28px; font-weight: 600; margin-top: 4px;
    background: linear-gradient(135deg, #ff6b9d, #c44dff);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .status-bar { display: flex; align-items: center; justify-content: center; gap: 8px; padding: 8px 20px; flex-shrink: 0; }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #333; transition: all 0.3s; }
  .status-dot.active { background: #ff6b9d; box-shadow: 0 0 12px #ff6b9d; }
  .status-dot.thinking { background: #c44dff; box-shadow: 0 0 12px #c44dff; animation: pulse 1.5s infinite; }
  .status-dot.speaking { background: #00e676; box-shadow: 0 0 12px #00e676; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .status-text { font-size: 13px; color: #888; text-transform: uppercase; letter-spacing: 1px; }
  .status-text.active { color: #ff6b9d; } .status-text.thinking { color: #c44dff; } .status-text.speaking { color: #00e676; }
  .transcript { flex: 1; overflow-y: auto; padding: 12px 20px; display: flex; flex-direction: column; gap: 16px; scroll-behavior: smooth; -webkit-overflow-scrolling: touch; }
  .msg { max-width: 90%; padding: 14px 18px; border-radius: 20px; font-size: 17px; line-height: 1.4; animation: fadeIn 0.25s ease; }
  @keyframes fadeIn { from { opacity:0; transform:translateY(6px) } to { opacity:1; transform:translateY(0) } }
  .msg.user { align-self: flex-end; background: #1a1a2e; color: #ccc; border-bottom-right-radius: 6px; }
  .msg.assistant { align-self: flex-start; background: linear-gradient(135deg, #2d1b3d, #1f1a3d); color: #fff; border-bottom-left-radius: 6px; }
  .msg-label { font-size: 11px; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 6px; opacity: 0.5; }
  .mic-area { flex-shrink: 0; padding: 20px 20px 40px; display: flex; flex-direction: column; align-items: center; gap: 12px; }
  .mic-btn { width: 100px; height: 100px; border-radius: 50%; border: 3px solid #333; background: #1a1a1a; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; outline: none; }
  .mic-btn:active, .mic-btn.pressed { border-color: #ff6b9d; background: #2d1a25; transform: scale(0.95); }
  .mic-btn svg { width: 40px; height: 40px; fill: #555; transition: fill 0.2s; }
  .mic-btn:active svg, .mic-btn.pressed svg { fill: #ff6b9d; }
  .mic-hint { font-size: 12px; color: #444; letter-spacing: 1px; text-transform: uppercase; }
  .error-banner { background: #3d1111; color: #ff6b6b; text-align: center; padding: 10px; font-size: 13px; display: none; flex-shrink: 0; }
  .error-banner.show { display: block; }
</style>
</head>
<body>

<div class="header"><div class="logo">Yeppo</div><h1>Sami</h1></div>

<div class="status-bar">
  <div class="status-dot" id="dot"></div>
  <span class="status-text" id="stxt">Lista para ayudar</span>
</div>

<div class="error-banner" id="err"></div>

<div class="transcript" id="ts">
  <div class="msg assistant"><div class="msg-label">Sami</div>¡Hola! Soy Sami, la asistente de Yeppo. Pregúntame lo que quieras sobre productos coreanos, horarios, o lo que necesites 😊</div>
</div>

<div class="mic-area">
  <button class="mic-btn" id="btn" title="Mantén presionado para hablar">
    <svg viewBox="0 0 24 24"><path d="M12 14a3 3 0 0 0 3-3V5a3 3 0 0 0-6 0v6a3 3 0 0 0 3 3zm5-3a5 5 0 0 1-10 0H5a7 7 0 0 0 6 6.93V21h2v-3.07A7 7 0 0 0 19 11h-2z"/></svg>
  </button>
  <div class="mic-hint">Mantén presionado para hablar</div>
</div>

<script>
// ── State
let pc, dc, audioEl, localStream;
let isPressed = false, isConnected = false;

// ── DOM
const dot = document.getElementById('dot');
const stxt = document.getElementById('stxt');
const ts = document.getElementById('ts');
const btn = document.getElementById('btn');
const errEl = document.getElementById('err');

function setStatus(s) {
  const m = {
    idle: ['Lista para ayudar',''],
    connecting: ['Conectando...','thinking'],
    listening: ['Escuchando...','active'],
    thinking: ['Pensando...','thinking'],
    speaking: ['Respondiendo...','speaking']
  };
  const [t,c] = m[s] || m.idle;
  stxt.textContent = t; stxt.className = 'status-text ' + (c || '');
  dot.className = 'status-dot' + (c ? ' '+c : '');
}

function addMsg(text, role) {
  const d = document.createElement('div');
  d.className = 'msg ' + role;
  const l = document.createElement('div');
  l.className = 'msg-label';
  l.textContent = role === 'assistant' ? 'Sami' : 'Tú';
  d.appendChild(l);
  d.appendChild(document.createTextNode(text));
  ts.appendChild(d);
  ts.scrollTop = ts.scrollHeight;
  return d;
}

function showErr(msg) {
  errEl.textContent = msg; errEl.classList.add('show');
  setTimeout(() => errEl.classList.remove('show'), 5000);
}

// ── WebRTC connect
async function connect() {
  setStatus('connecting');
  try {
    // 1. Get ephemeral token from our backend
    const tr = await fetch('/token', { method: 'POST' });
    if (!tr.ok) throw new Error('Backend token error ' + tr.status);
    const { value: EPHEMERAL_KEY } = await tr.json();

    // 2. Create RTCPeerConnection
    pc = new RTCPeerConnection();

    // 3. Audio output
    audioEl = document.createElement('audio');
    audioEl.autoplay = true;
    pc.ontrack = e => { audioEl.srcObject = e.streams[0]; };

    // 4. Data channel for events
    dc = pc.createDataChannel('oai-events');
    dc.onmessage = e => handleEvent(JSON.parse(e.data));

    // 5. Get mic
    localStream = await navigator.mediaDevices.getUserMedia({
      audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true }
    });
    pc.addTrack(localStream.getAudioTracks()[0]);

    // 6. Offer
    const offer = await pc.createOffer();
    await pc.setLocalDescription(offer);

    // 7. SDP exchange with OpenAI Realtime API
    const sdpRes = await fetch(
      `https://api.openai.com/v1/realtime/calls?client_secret=${encodeUR…(EPHEMERAL_KEY)}`,
      { method: 'POST', headers: { 'Content-Type': 'application/sdp' }, body: offer.sdp }
    );
    if (!sdpRes.ok) throw new Error('SDP error ' + sdpRes.status);
    const answerSdp = await sdpRes.text();
    await pc.setRemoteDescription({ type: 'answer', sdp: answerSdp });

    isConnected = true;
    setStatus('idle');

  } catch (e) {
    console.error(e);
    setStatus('idle'); dot.className = 'status-dot';
    showErr('Error de conexión: ' + e.message);
    cleanup();
  }
}

// ── Event handler
let curText = '', curDiv = null;

function handleEvent(ev) {
  switch (ev.type) {
    case 'response.audio_transcript.delta':
      curText += ev.delta;
      if (!curDiv) curDiv = addMsg('', 'assistant');
      // update last text node
      const cn = curDiv.childNodes;
      for (let i = cn.length-1; i >= 0; i--) {
        if (cn[i].nodeType === 3) { cn[i].textContent = curText; break; }
      }
      break;

    case 'response.audio_transcript.done':
      if (curDiv && ev.transcript) {
        for (let i = curDiv.childNodes.length-1; i >= 0; i--) {
          if (curDiv.childNodes[i].nodeType === 3) { curDiv.childNodes[i].textContent = ev.transcript; break; }
        }
      }
      curText = ''; curDiv = null;
      break;

    case 'conversation.item.input_audio_transcription.completed':
      if (ev.transcript) addMsg(ev.transcript, 'user');
      break;

    case 'response.audio.delta':
      setStatus('speaking');
      break;

    case 'response.audio.done':
    case 'response.done':
      setStatus('idle');
      curText = ''; curDiv = null;
      break;

    case 'input_audio_buffer.speech_started':
      setStatus('listening');
      break;

    case 'input_audio_buffer.speech_stopped':
      setStatus('thinking');
      break;

    case 'error':
      console.error(ev.error);
      showErr(ev.error?.message || 'Error');
      break;
  }
}

function cleanup() {
  try { pc?.close(); } catch(e){}
  try { localStream?.getTracks().forEach(t => t.stop()); } catch(e){}
  pc = null; dc = null; localStream = null; audioEl = null; isConnected = false;
}

// ── Push-to-talk
btn.addEventListener('pointerdown', async e => {
  e.preventDefault();
  if (isPressed) return;
  isPressed = true;
  btn.classList.add('pressed');

  if (!isConnected) await connect();
  localStream?.getAudioTracks().forEach(t => t.enabled = true);
  setStatus('listening');
});

btn.addEventListener('pointerup', e => {
  e.preventDefault();
  if (!isPressed) return;
  isPressed = false;
  btn.classList.remove('pressed');
  localStream?.getAudioTracks().forEach(t => t.enabled = false);
  setStatus('thinking');
});

btn.addEventListener('pointerleave', () => {
  if (!isPressed) return;
  isPressed = false;
  btn.classList.remove('pressed');
  localStream?.getAudioTracks().forEach(t => t.enabled = false);
  setStatus('thinking');
});

// Keyboard for desktop testing
document.addEventListener('keydown', e => {
  if (e.code === 'Space' && document.activeElement === document.body) { e.preventDefault(); btn.dispatchEvent(new PointerEvent('pointerdown')); }
});
document.addEventListener('keyup', e => {
  if (e.code === 'Space') { e.preventDefault(); btn.dispatchEvent(new PointerEvent('pointerup')); }
});

window.addEventListener('beforeunload', cleanup);
setStatus('idle');
</script>
</body>
</html>
